name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            artifact: RefreshToggle-x64.exe
          - rid: win-arm64
            artifact: RefreshToggle-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (${{ matrix.rid }})
        run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained -o publish\${{ matrix.rid }}

      - name: Stage artifact
        run: copy publish\${{ matrix.rid }}\RefreshToggle.exe ${{ matrix.artifact }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
