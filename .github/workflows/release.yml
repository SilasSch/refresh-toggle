name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-arm64
            artifact: RefreshToggle-arm64
          - rid: win-x64
            artifact: RefreshToggle-x64

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Publish
        run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:PublishTrimmed=false -o ./publish/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./publish/${{ matrix.artifact }}/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download ARM64
        uses: actions/download-artifact@v4
        with:
          name: RefreshToggle-arm64
          path: ./artifacts/arm64

      - name: Download x64
        uses: actions/download-artifact@v4
        with:
          name: RefreshToggle-x64
          path: ./artifacts/x64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./artifacts/arm64/RefreshToggle.exe
            ./artifacts/x64/RefreshToggle.exe
